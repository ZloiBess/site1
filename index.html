<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style/style.css">
    <title>TestSite</title>
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <div class="header__container _container">
          <div class="header__banner" >
          <a href="" class="header__logo">
            <font color="green">Fruit</font><font color="orange">Book</font>
          </a>
          <div class="header__search">
          <form>
            <img class="img__search" src="images/glass.svg">
            <input type="text" name="search" class="search" placeholder="Шукати на FruitBook">
          </form>
          </div>
          </div>
          <nav class=header__menu>
            <ul class="menu__list">
            <li class="menu__item">
              <a href="" class="menu__link">

                <img src="images/house.svg" title="houes">
                <p class=menu__text>Головна</p>

              </a>
            </li>
            <li class="menu__item">
              <a href="" class="menu__link">

                <img src="images/friends.svg" title="friends">
                <p class=menu__text>Друзі</p>

              </a>
            </li>
            <li class="menu__item">
              <a href="" class="menu__link">

                <img src="images/group.svg" title="group">
                <p class=menu__text>Група</p>

              </a>
            </li>
            <li class="menu__item">
              <a href="" class="menu__link">

                <img src="images/game.svg" title="games">
                <p class=menu__text>Ігри</p>

              </a>
            </li>
            <li class="menu__item">
              <a href="" class="menu__link">

                 <img src="images/watch.svg" title="watch">
                 <p class=menu__text>Дивитись</p>

               </a>
            </li>
            </ul>
          </nav>
          <nav class=header__setting>
            <ul class="menu__settig">
            <li class="setting__item">
              <a href= "" class="setting__link">
                <img src="images/plus.svg" title="Cтворити">
              </a>
            </li>
            <li class="setting__item">
              <a href= "" class="setting__link">
                <img src="images/message.svg" title="Повідомлення">
              </a>
            </li>
            <li class="setting__item">
              <a  href= "" class="setting__link">
                <img src="images/bell.svg" title="Cповіщення">
              </a>
            </li>
            <li class="setting__item">
              <a  href= "" class="setting__link">
                <img src="images/user.svg" title="Профіль">
              </a>
            </li>
            </ul>
          </nav>
        </div>
      </header>
    <main class="main">
        <p>main</p>
    </main>
    <footer class=footer>
        <p>footer</p>
    </footer>
    </div>
  </body>
</html>
